<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Letterboxd Private Notes</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>Letterboxd Notes</h1>
    <div class="header-actions">
      <div id="count" class="muted"></div>
      <button id="sortToggle" aria-label="Trier les notes">↓</button>
    </div>
  </header>

  <input id="search" type="search" placeholder="Search my notes…" />

  <ul id="list"></ul>
  <p id="empty" class="muted" hidden>No notes saved yet. Open a film page on Letterboxd and click Notes to create one.</p>

  <footer>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
